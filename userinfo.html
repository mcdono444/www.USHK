<div class="container">

        <div class="card">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    async function loadData() {
        try {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            const userDocRef = doc(db, 'users', userId);
            const userSnapshot = await getDoc(userDocRef);

            if (userSnapshot.exists()) {
                const userData = userSnapshot.data();
                $('#userPhone').text(userData.phone || '---');
                $('#userId').text(userId);

                const createdAt = userData.createdAt ? new Date(userData.createdAt.toDate ? userData.createdAt.toDate() : userData.createdAt) : new Date();
                $('#joinDate').text(createdAt.toLocaleDateString('es-MZ'));

                // Obtener nivel VIP
                const vipLevel = userData.vipLevel || 0;
                let vipText = 'VIP0 (Gratuito)';
                if (vipLevel === 1) vipText = 'VIP1';
                else if (vipLevel === 2) vipText = 'VIP2';
                else if (vipLevel === 3) vipText = 'VIP3';
                else if (vipLevel > 3) vipText = `VIP${vipLevel}`;
                
                $('#vipLevel').text(vipText);

                // Obtener estado de cuenta bancaria
                const banksRef = collection(db, 'bankAccounts');
                const q = query(banksRef, where('userId', '==', userId));
                const banksSnapshot = await getDocs(q);

                if (!banksSnapshot.empty) {
                    const firstBank = banksSnapshot.docs[0].data();
                    const bankName = firstBank.bank || firstBank.bankName || 'Banco';
                    const account = firstBank.account || firstBank.accountNumber || 'N/A';
                    const lastFour = account.slice(-4);
                    $('#bankStatus').text(`${bankName} (****${lastFour})`);
                } else {
                    $('#bankStatus').text('No agregada');
                }
            }
        } catch(e) {
            console.error('Error loading data:', e);
        }
    }

    window.openChangePassword = function() {
        const newPass = prompt('Ingrese la nueva contraseña (mínimo 6 caracteres):');
        if (newPass && newPass.length >= 6) {
            window.changePassword(newPass);
        } else if (newPass) {
            alert('La contraseña debe tener al menos 6 caracteres');
        }
    }

    window.changePassword = async function(newPassword) {
        try {
            const user = auth.currentUser;
            if (!user) {
                alert('Usuario no autenticado');
                return;
            }

            await updatePassword(user, newPassword);
            alert('✅ Contraseña cambiada exitosamente');
        } catch(error) {
            console.error('Error changing password:', error);
            alert('❌ Error: ' + error.message);
        }
    }

    window.logout = async function() {
        try {
            await auth.signOut();
            localStorage.clear();
            window.location.href = 'login.html';
        } catch(error) {
            console.error('Error logging out:', error);
            localStorage.clear();
            window.location.href = 'login.html';
        }
    }

    // Verificar autenticación
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            loadData();
        }
    });
</script>
