<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    let currentTab = 0;
    let transactions = [];

    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(function() { div.fadeOut(300, function() { $(this).remove(); }); }, 2500);
    }

    function getTransactionTitle(t) {
        if (t.details) return t.details;
        switch(t.type) {
            case 'deposit': return 'Depósito';
            case 'withdrawal': return 'Retiro';
            case 'purchase': return 'Compra de producto VIP';
            case 'referral': return 'Comisión por referido';
            case 'daily_income': return 'Ingreso diario';
            case 'checkin': return 'Check-in diario';
            case 'bonus': return 'Bono';
            case 'admin_add': return 'Adición por administrador';
            case 'admin_remove': return 'Deducción por administrador';
            case 'lucky_spin': return 'Ruleta de la suerte';
            default: return 'Transacción';
        }
    }

    async function loadTransactions() {
        try {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            // Consultar transacciones del usuario
            const transactionsRef = collection(db, 'transactions');
            const q = query(transactionsRef, where('userId', '==', userId));
            const querySnapshot = await getDocs(q);

            transactions = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                transactions.push({
                    id: doc.id,
                    amount: data.amount || 0,
                    type: data.type || 'transaction',
                    details: data.details || '',
                    date: data.date || data.createdAt || new Date().toISOString(),
                    status: data.status || 'completed'
                });
            });

            // Ordenar por fecha descendente
            transactions.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return dateB - dateA;
            });

            renderRecords();
        } catch (error) {
            console.error('Error loading transactions:', error);
            showMessage('Error al cargar datos: ' + error.message, 'error');
        }
    }

    function renderRecords() {
        const incomeList = transactions.filter(function(t) { 
            return t.amount > 0 || 
                   t.type === 'referral' || 
                   t.type === 'daily_income' || 
                   t.type === 'checkin' ||
                   t.type === 'bonus' || 
                   t.type === 'deposit';
        });
        
        const expenseList = transactions.filter(function(t) { 
            return t.amount < 0 || 
                   t.type === 'withdrawal' || 
                   t.type === 'purchase';
        });
        
        renderList(0, incomeList);
        renderList(1, expenseList);
    }

    function renderList(tab, list) {
        var container = $('#recordsList' + tab);
        var emptyState = $('#emptyState' + tab);
        
        if (list.length === 0) {
            container.empty();
            emptyState.removeClass('hidden');
            return;
        }
        
        emptyState.addClass('hidden');
        var html = '';
        for (var i = 0; i < list.length; i++) {
            var t = list[i];
            var amountClass = (tab === 0) ? 'income' : 'expense';
            var sign = (tab === 0) ? '+' : '-';
            var amount = Math.abs(t.amount || 0);
            
            var dateObj = new Date(t.date);
            var dateStr = dateObj.toLocaleString('es-MZ', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            html += '<div class="record-item">';
            html += '<div class="record-info">';
            html += '<div class="record-time">' + dateStr + '</div>';
            html += '<div class="record-title">' + getTransactionTitle(t) + '</div>';
            html += '</div>';
            html += '<div class="record-amount ' + amountClass + '">' + sign + ' ' + amount.toFixed(2) + ' MZN</div>';
            html += '</div>';
        }
        container.html(html);
    }

    window.renderRecords = renderRecords;
    window.renderList = renderList;

    $('.tab-item').on('click', function() {
        var tab = $(this).data('tab');
        if (tab == currentTab) return;
        currentTab = tab;
        $('.tab-item').removeClass('active');
        $(this).addClass('active');
        $('#recordsList0, #recordsList1').addClass('hidden');
        $('#emptyState0, #emptyState1').addClass('hidden');
        $('#recordsList' + tab).removeClass('hidden');
    });

    // Verificar autenticação
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            loadTransactions();
        }
    });
</script>
