<script>
    const userId = localStorage.getItem('userId');
    
    if (!userId) {
        window.location.href = 'login.html';
    }
    
    let currentTab = 0;
    let transactions = [];
    
    function getFirebase() {
        return new Promise((resolve) => {
            const checkInterval = setInterval(() => {
                if (window.firebaseModules) {
                    clearInterval(checkInterval);
                    resolve(window.firebaseModules);
                }
            }, 100);
        });
    }
    
    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(function() { div.fadeOut(300, function() { $(this).remove(); }); }, 2500);
    }
    
    function getTransactionTitle(t) {
        if (t.details) return t.details;
        switch(t.type) {
            case 'deposit': return 'Depósito';
            case 'withdrawal': return 'Retiro';
            case 'purchase': return 'Compra de producto VIP';
            case 'referral': return 'Comisión por referido';
            case 'daily_income': return 'Ingreso diario';
            case 'bonus': return 'Bono';
            case 'admin_add': return 'Adición por administrador';
            case 'admin_remove': return 'Deducción por administrador';
            case 'lucky_spin': return 'Ruleta de la suerte';
            default: return 'Transacción';
        }
    }
    
    async function initializeSampleTransactions() {
        try {
            const { db, collection, query, where, getDocs, setDoc, doc } = await getFirebase();
            
            // Verificar si hay transacciones SIN usar orderBy (evitar problema de índice)
            const transactionsRef = collection(db, 'transactions');
            const q = query(transactionsRef, where('userId', '==', userId));
            const querySnapshot = await getDocs(q);
            
            // Si está vacío, crear datos de ejemplo
            if (querySnapshot.empty) {
                console.log('Creando transacciones de ejemplo...');
                
                const sampleTransactions = [
                    {
                        userId: userId,
                        type: 'deposit',
                        amount: 5000,
                        details: 'Depósito inicial',
                        date: new Date(Date.now() - 10*24*60*60*1000).toISOString(),
                        timestamp: Date.now() - 10*24*60*60*1000
                    },
                    {
                        userId: userId,
                        type: 'purchase',
                        amount: -1000,
                        details: 'Compra de producto VIP Premium',
                        date: new Date(Date.now() - 8*24*60*60*1000).toISOString(),
                        timestamp: Date.now() - 8*24*60*60*1000
                    },
                    {
                        userId: userId,
                        type: 'daily_income',
                        amount: 80,
                        details: 'Ingreso diario de productos',
                        date: new Date(Date.now() - 7*24*60*60*1000).toISOString(),
                        timestamp: Date.now() - 7*24*60*60*1000
                    },
                    {
                        userId: userId,
                        type: 'referral',
                        amount: 500,
                        details: 'Comisión por referido',
                        date: new Date(Date.now() - 5*24*60*60*1000).toISOString(),
                        timestamp: Date.now() - 5*24*60*60*1000
                    },
                    {
                        userId: userId,
                        type: 'bonus',
                        amount: 200,
                        details: 'Bono de bienvenida',
                        date: new Date(Date.now() - 3*24*60*60*1000).toISOString(),
                        timestamp: Date.now() - 3*24*60*60*1000
                    },
                    {
                        userId: userId,
                        type: 'withdrawal',
                        amount: -2000,
                        details: 'Retiro a cuenta bancaria',
                        date: new Date(Date.now() - 1*24*60*60*1000).toISOString(),
                        timestamp: Date.now() - 1*24*60*60*1000
                    },
                    {
                        userId: userId,
                        type: 'daily_income',
                        amount: 160,
                        details: 'Ingreso diario de productos',
                        date: new Date().toISOString(),
                        timestamp: Date.now()
                    }
                ];
                
                for (let transaction of sampleTransactions) {
                    try {
                        const docRef = doc(collection(db, 'transactions'));
                        await setDoc(docRef, transaction);
                    } catch(e) {
                        console.error('Error creando transacción:', e);
                    }
                }
                
                showMessage('✅ Datos cargados', 'success');
            }
        } catch (error) {
            console.error('Error inicializando datos:', error);
        }
    }
    
    async function loadTransactions() {
        try {
            const { db, collection, query, where, getDocs } = await getFirebase();
            
            console.log('Cargando transacciones para userId:', userId);
            
            // IMPORTANTE: SIN orderBy para evitar necesidad de índice compuesto
            const transactionsRef = collection(db, 'transactions');
            const q = query(transactionsRef, where('userId', '==', userId));
            
            const querySnapshot = await getDocs(q);
            transactions = [];
            
            querySnapshot.forEach((doc) => {
                transactions.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            
            // Ordenar en el frontend en lugar de en Firestore
            transactions.sort((a, b) => {
                const dateA = new Date(a.date).getTime();
                const dateB = new Date(b.date).getTime();
                return dateB - dateA; // Descendente (más reciente primero)
            });
            
            console.log('Transacciones cargadas:', transactions.length);
            
            if (transactions.length === 0) {
                console.log('Sin transacciones, inicializando datos de ejemplo...');
                await initializeSampleTransactions();
                setTimeout(loadTransactions, 1500);
                return;
            }
            
            renderRecords();
        } catch (error) {
            console.error('Error loading transactions:', error);
            showMessage('Error: ' + error.message, 'error');
            
            // Mostrar error
            $('#recordsList0').html('<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="empty-text">Error: ' + error.message + '</div></div>');
            $('#recordsList1').html('<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="empty-text">Error al cargar</div></div>');
        }
    }
    
    function renderRecords() {
        const incomeList = transactions.filter(function(t) { 
            return t.amount > 0 || 
                   t.type === 'referral' || 
                   t.type === 'daily_income' || 
                   t.type === 'bonus' || 
                   t.type === 'deposit';
        });
        
        const expenseList = transactions.filter(function(t) { 
            return t.amount < 0 || 
                   t.type === 'withdrawal' || 
                   t.type === 'purchase';
        });
        
        renderList(0, incomeList);
        renderList(1, expenseList);
    }
    
    function renderList(tab, list) {
        var container = $('#recordsList' + tab);
        var emptyState = $('#emptyState' + tab);
        
        if (list.length === 0) {
            container.empty();
            emptyState.removeClass('hidden');
            return;
        }
        
        emptyState.addClass('hidden');
        var html = '';
        for (var i = 0; i < list.length; i++) {
            var t = list[i];
            var amountClass = (tab === 0) ? 'income' : 'expense';
            var sign = (tab === 0) ? '+' : '-';
            var amount = Math.abs(t.amount || 0);
            
            html += '<div class="record-item">';
            html += '<div class="record-info">';
            html += '<div class="record-time">' + new Date(t.date).toLocaleString('es-MZ') + '</div>';
            html += '<div class="record-title">' + getTransactionTitle(t) + '</div>';
            html += '</div>';
            html += '<div class="record-amount ' + amountClass + '">' + sign + ' ' + amount.toFixed(2) + ' MZN</div>';
            html += '</div>';
        }
        container.html(html);
    }
    
    $('.tab-item').on('click', function() {
        var tab = $(this).data('tab');
        if (tab == currentTab) return;
        currentTab = tab;
        $('.tab-item').removeClass('active');
        $(this).addClass('active');
        $('#recordsList0, #recordsList1').addClass('hidden');
        $('#emptyState0, #emptyState1').addClass('hidden');
        $('#recordsList' + tab).removeClass('hidden');
    });
    
    // Inicializar
    async function init() {
        console.log('Inicializando página...');
        await getFirebase();
        await initializeSampleTransactions();
        await loadTransactions();
        
        // Recarregar a cada 60 segundos
        setInterval(loadTransactions, 60000);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
