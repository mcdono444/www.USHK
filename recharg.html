    <style>

        body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding-bottom: 70px; }
        .container { max-width: 430px; margin: 0 auto; background: #f0f2f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a5d2a, #0d3e1a); padding: 20px; text-align: center; color: white; border-radius: 0 0 25px 25px; }
        .header h2 { font-size: 20px; }
        .amount-display { background: #22C55E; border-radius: 16px; padding: 15px; margin: 15px; text-align: center; color: white; }
        .amount-display .label { font-size: 14px; opacity: 0.9; }
        .amount-display .value { font-size: 32px; font-weight: bold; }
        .section-title { font-size: 16px; font-weight: bold; color: #333; margin: 0 15px 10px; }
        
        /* Payment Methods Tabs */
        .payment-tabs { display: flex; gap: 10px; margin: 15px; }
        .payment-tab { flex: 1; text-align: center; padding: 12px; border-radius: 12px; cursor: pointer; background: white; border: 2px solid #e5e5e5; transition: all 0.3s; }
        .payment-tab.active { border-color: #22C55E; background: #f0fdf4; }
        .payment-tab i { font-size: 24px; display: block; margin-bottom: 5px; }
        .payment-tab span { font-size: 12px; font-weight: bold; }
        
        .payment-card { background: white; border-radius: 16px; margin: 15px; padding: 20px; border: 2px solid #22C55E; display: none; }
        .payment-card.active { display: block; }
        .payment-icon { text-align: center; margin-bottom: 15px; }
        .payment-icon i { font-size: 50px; }
        .payment-title { text-align: center; font-size: 20px; font-weight: bold; color: #1a2a3a; margin-bottom: 15px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; align-items: center; flex-wrap: wrap; gap: 8px; }
        .info-label { font-weight: 600; color: #555; }
        .info-value { color: #333; font-family: monospace; font-size: 14px; word-break: break-all; }
        .copy-btn { background: #22C55E; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        
        .form-section { background: white; border-radius: 16px; margin: 15px; padding: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: #333; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 2px solid #e5e5e5; border-radius: 12px; font-size: 14px; }
        .input-group textarea { resize: vertical; min-height: 60px; }
        
        .file-upload { border: 2px dashed #22C55E; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; background: #f0fdf4; margin-bottom: 15px; }
        .file-upload i { font-size: 40px; color: #22C55E; margin-bottom: 10px; display: block; }
        .file-name { font-size: 12px; color: #666; margin-top: 5px; }
        
        .submit-btn { width: 100%; background: #22C55E; color: white; border: none; padding: 16px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #22C55E; display: flex; justify-content: space-around; padding: 8px 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; color: white; flex: 1; }
        .nav-icon i { font-size: 20px; }
        .nav-label { font-size: 9px; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 50px; z-index: 10001; font-size: 14px; font-weight: bold; }
        .toast.success { background: #dcfce7; color: #166534; }
        .toast.error { background: #fee2e2; color: #b91c1c; }

<body>
<div class="container">
    <div class="header">
        <h2><i class="fas fa-hand-holding-usd"></i> Depósito Manual</h2>
        <p>Selecciona tu método de pago</p>
    </div>
    
    <div class="amount-display" id="amountDisplay">
        <div class="label">Monto a depositar</div>
        <div class="value" id="displayAmount">0 MZN</div>
    </div>
    
    <!-- Payment Methods Tabs -->
    <div class="payment-tabs">
        <div class="payment-tab active" data-method="emola" onclick="selectPaymentMethod('emola')">
            <i class="fas fa-mobile-alt" style="color:#e74c3c;"></i>
            <span>E-Mola</span>
        </div>
        <div class="payment-tab" data-method="mpesa" onclick="selectPaymentMethod('mpesa')">
            <i class="fas fa-comment-dollar" style="color:#27ae60;"></i>
            <span>M-Pesa</span>
        </div>
    </div>
    
    <!-- E-Mola Card -->
    <div id="emolaCard" class="payment-card active">
        <div class="payment-icon"><i class="fas fa-comment-dollar" style="color:#e74c3c;"></i></div>
        <div class="payment-title">E-Mola</div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-user"></i> Titular:</span>
            <span class="info-value">Makel Fernando macuacua</span>
            <button class="copy-btn" onclick="copyText('Makel Fernando macuacua')">Copiar</button>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-mobile-alt"></i> Número:</span>
            <span class="info-value">874274045</span>
            <button class="copy-btn" onclick="copyText('874274045')">Copiar</button>
        </div>
    </div>
    
    <!-- M-Pesa Card -->
    <div id="mpesaCard" class="payment-card">
        <div class="payment-icon"><i class="fas fa-comment-dollar" style="color:#27ae60;"></i></div>
        <div class="payment-title">M-Pesa</div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-user"></i> Titular:</span>
            <span class="info-value">Clesio samuel</span>
            <button class="copy-btn" onclick="copyText('Clesio samuel')">Copiar</button>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-mobile-alt"></i> Número:</span>
            <span class="info-value">849088093</span>
            <button class="copy-btn" onclick="copyText('849088093')">Copiar</button>
        </div>
    </div>
    
    <div class="form-section">
        <div class="section-title" style="margin: 0 0 15px 0;">📝 Datos de la transferencia</div>
        <div class="input-group">
            <label><i class="fas fa-user"></i> Nombre del titular que transfiere</label>
            <input type="text" id="senderName" placeholder="Nombre completo">
        </div>
        <div class="file-upload" onclick="document.getElementById('receipt').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <div id="fileName">Subir comprobante de pago (imagen)</div>
            <input type="file" id="receipt" accept="image/*" style="display: none;" onchange="handleFileSelect(this)">
        </div>
        <div class="input-group">
            <label><i class="fas fa-comment"></i> Notas adicionales (opcional)</label>
            <textarea id="notes" placeholder="Ej: Transferencia desde E-Mola/M-Pesa..."></textarea>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitDeposit()">
            <i class="fas fa-paper-plane"></i> Enviar solicitud
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    const urlParams = new URLSearchParams(window.location.search);
    let depositAmount = parseFloat(urlParams.get('amount')) || 0;
    let receiptFile = null;
    let selectedMethod = 'emola';

    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(() => div.fadeOut(300, () => div.remove()), 2500);
    }

    window.copyText = function(text) {
        navigator.clipboard.writeText(text);
        showMessage('✅ ' + text + ' copiado', 'success');
    }

    window.handleFileSelect = function(input) {
        if (input.files && input.files[0]) {
            receiptFile = input.files[0];
            $('#fileName').text('📎 ' + receiptFile.name);
        }
    }

    window.selectPaymentMethod = function(method) {
        selectedMethod = method;
        $('.payment-tab').removeClass('active');
        $(`.payment-tab[data-method="${method}"]`).addClass('active');
        $('.payment-card').removeClass('active');
        if (method === 'emola') {
            $('#emolaCard').addClass('active');
        } else {
            $('#mpesaCard').addClass('active');
        }
    }

    if (depositAmount > 0) {
        $('#displayAmount').text(depositAmount.toFixed(2) + ' MZN');
    } else {
        $('#displayAmount').text('0 MZN');
    }

    window.submitDeposit = async function() {
        if (depositAmount < 250) {
            showMessage('❌ El monto mínimo es 250 MZN', 'error');
            return;
        }
        
        const senderName = $('#senderName').val().trim();
        if (!senderName) {
            showMessage('❌ Ingresa el nombre del titular', 'error');
            return;
        }
        
        if (!receiptFile) {
            showMessage('❌ Sube el comprobante de pago', 'error');
            return;
        }
        
        const btn = $('#submitBtn');
        btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Enviando...');
        
        const reader = new FileReader();
        reader.onloadend = async function() {
            try {
                const receiptBase64 = reader.result;
                const paymentMethodName = selectedMethod === 'emola' ? 'E-Mola' : 'M-Pesa';
                
                if (!userId) {
                    showMessage('❌ Usuario no válido', 'error');
                    btn.prop('disabled', false).html('<i class="fas fa-paper-plane"></i> Enviar solicitud');
                    return;
                }

                // Crear documento de depósito pendiente
                const depositData = {
                    userId: userId,
                    amount: depositAmount,
                    paymentMethod: paymentMethodName,
                    senderName: senderName,
                    notes: $('#notes').val() || '',
                    receipt: receiptBase64,
                    status: 'pending',
                    createdAt: Timestamp.now(),
                    updatedAt: Timestamp.now()
                };

                // Agregar a colección de depósitos
                const depositsRef = collection(db, 'deposits');
                const depositRef = await addDoc(depositsRef, depositData);

                showMessage('✅ Solicitud enviada correctamente. Espera confirmación.', 'success');
                setTimeout(() => window.location.href = 'index.html', 2000);

            } catch(error) {
                console.error('Submit error:', error);
                showMessage('Error al enviar solicitud: ' + error.message, 'error');
                btn.prop('disabled', false).html('<i class="fas fa-paper-plane"></i> Enviar solicitud');
            }
        };
        
        reader.readAsDataURL(receiptFile);
    }

    // Verificar autenticación
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        }
    });
</script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
