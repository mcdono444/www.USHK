    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding-bottom: 70px; }
        .app-container { max-width: 430px; margin: 0 auto; background: #f5f5f5; min-height: 100vh; }
        
        .header-section { background: #22C55E; padding: 12px 16px 0; position: sticky; top: 0; z-index: 100; }
        .top-nav { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; }
        .back-btn { color: white; font-size: 20px; cursor: pointer; text-decoration: none; margin-right: 12px; }
        .page-title { color: white; font-size: 16px; font-weight: bold; flex: 1; text-align: center; margin-right: 30px; }
        
        .tabs-nav { display: flex; justify-content: center; gap: 30px; padding-bottom: 12px; }
        .tab-item { color: white; font-size: 14px; font-weight: 500; cursor: pointer; padding-bottom: 4px; }
        .tab-item.active { color: #1a8f3d; font-weight: 600; border-bottom: 2px solid #22C55E; }
        
        .content-section { padding: 16px; min-height: calc(100vh - 120px); }
        
        .messages-list { display: flex; flex-direction: column; gap: 12px; }
        .message-card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .message-content { color: #333; font-size: 14px; line-height: 1.6; word-break: break-word; }
        .message-content.collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .message-toggle { margin-top: 10px; font-size: 12px; color: #22C55E; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .message-toggle i { font-size: 10px; transition: transform 0.3s; }
        .message-card.expanded .message-toggle i { transform: rotate(180deg); }
        .message-date { color: #999; font-size: 11px; margin-top: 10px; display: flex; align-items: center; gap: 5px; }
        
        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 12px; }
        .empty-icon { font-size: 48px; color: #ccc; margin-bottom: 15px; }
        .empty-text { color: #999; font-size: 14px; }
        
        .hidden { display: none; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #22C55E; display: flex; justify-content: space-around; padding: 8px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; color: white; flex: 1; }
        .nav-icon i { font-size: 20px; }
        .nav-label { font-size: 9px; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 50px; z-index: 10001; font-size: 14px; font-weight: bold; }
        .toast.success { background: #dcfce7; color: #166534; }
        .toast.error { background: #fee2e2; color: #b91c1c; }
    </style>

<body>
<div class="app-container">

        </div>
        <div id="messagesListRead" class="messages-list hidden">
            <div class="empty-state"><div class="empty-icon"><i class="fas fa-envelope"></i></div><div class="empty-text">No hay notificaciones leídas</div></div>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    var currentTab = 'unread';
    var messages = [];

    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(function() { div.fadeOut(300, function() { $(this).remove(); }); }, 2500);
    }

    async function loadMessages() {
        try {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            // Obtener notificaciones del usuario
            const notificationsRef = collection(db, 'notifications');
            const q = query(notificationsRef, where('userId', '==', userId));
            const querySnapshot = await getDocs(q);

            messages = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                messages.push({
                    id: doc.id,
                    content: data.content || '',
                    status: data.status || 'unread',
                    date: data.date || data.createdAt || new Date().toISOString()
                });
            });

            // Ordenar por fecha descendente
            messages.sort((a, b) => new Date(b.date) - new Date(a.date));

            renderMessages();
        } catch(error) {
            console.error('Error loading messages:', error);
            showMessage('Error al cargar notificaciones: ' + error.message, 'error');
        }
    }

    window.markAsRead = async function(msgId) {
        try {
            // Actualizar estado en Firestore
            const msgRef = doc(db, 'notifications', msgId);
            await updateDoc(msgRef, {
                status: 'read',
                updatedAt: new Date().toISOString()
            });

            // Actualizar en array local
            for (var i = 0; i < messages.length; i++) {
                if (messages[i].id === msgId) {
                    messages[i].status = 'read';
                    break;
                }
            }
            renderMessages();
            showMessage('✓ Marcado como leído', 'success');
        } catch(error) {
            console.error('Error marking as read:', error);
            showMessage('Error al marcar como leído', 'error');
        }
    }

    function renderMessages() {
        var unreadList = messages.filter(function(m) { return m.status !== 'read'; });
        var readList = messages.filter(function(m) { return m.status === 'read'; });
        
        renderList('Unread', unreadList);
        renderList('Read', readList);
    }

    function renderList(tab, list) {
        var container = $('#messagesList' + tab);
        var isUnread = (tab === 'Unread');
        
        if (list.length === 0) {
            var emptyText = isUnread ? 'No hay notificaciones no leídas' : 'No hay notificaciones leídas';
            container.html('<div class="empty-state"><div class="empty-icon"><i class="fas fa-envelope-open"></i></div><div class="empty-text">' + emptyText + '</div></div>');
            return;
        }
        
        var html = '';
        for (var i = 0; i < list.length; i++) {
            var msg = list[i];
            var dateObj = new Date(msg.date);
            var dateStr = dateObj.toLocaleString('es-MZ', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });

            html += '<div class="message-card" data-id="' + msg.id + '">';
            html += '<div class="message-content collapsed">' + msg.content + '</div>';
            html += '<div class="message-toggle" onclick="window.toggleMessage(this)"><i class="fas fa-chevron-down"></i><span>Expandir</span></div>';
            html += '<div class="message-date"><i class="fas fa-clock"></i> ' + dateStr + '</div>';
            if (isUnread) {
                html += '<div style="margin-top: 10px;"><button class="mark-read-btn" onclick="window.markAsRead(\'' + msg.id + '\')" style="background:#22C55E; color:white; border:none; padding:5px 12px; border-radius:20px; font-size:11px; cursor:pointer;"><i class="fas fa-check"></i> Marcar como leído</button></div>';
            }
            html += '</div>';
        }
        container.html(html);
    }

    window.toggleMessage = function(el) {
        var card = $(el).closest('.message-card');
        var content = card.find('.message-content');
        var icon = $(el).find('i');
        var text = $(el).find('span');
        
        if (content.hasClass('collapsed')) {
            content.removeClass('collapsed');
            icon.css('transform', 'rotate(180deg)');
            text.text('Contraer');
        } else {
            content.addClass('collapsed');
            icon.css('transform', 'rotate(0deg)');
            text.text('Expandir');
        }
    }

    window.renderMessages = renderMessages;

    $('.tab-item').on('click', function() {
        var tab = $(this).data('tab');
        if (tab === currentTab) return;
        currentTab = tab;
        $('.tab-item').removeClass('active');
        $(this).addClass('active');
        $('#messagesListUnread, #messagesListRead').addClass('hidden');
        $('#messagesList' + (tab === 'unread' ? 'Unread' : 'Read')).removeClass('hidden');
    });

    // Verificar autenticação
    onAuthStateChanged(auth, async (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            // Crear notificaciones de ejemplo si no existen
            try {
                const notificationsRef = collection(db, 'notifications');
                const q = query(notificationsRef, where('userId', '==', userId));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    // Criar notificações de exemplo
                    const sampleMessages = [
                        {
                            userId: userId,
                            content: '¡Bienvenido a la plataforma USHK! Te deseamos una experiencia agradable.',
                            status: 'unread',
                            date: new Date().toISOString(),
                            createdAt: new Date()
                        },
                        {
                            userId: userId,
                            content: 'Tu cuenta ha sido activada exitosamente. Ahora puedes comenzar a invertir.',
                            status: 'unread',
                            date: new Date(Date.now() - 86400000).toISOString(),
                            createdAt: new Date(Date.now() - 86400000)
                        },
                        {
                            userId: userId,
                            content: 'Oferta especial: Obtén un bono del 10% al depositar tus primeros 1000 MZN durante los próximos 7 días.',
                            status: 'read',
                            date: new Date(Date.now() - 172800000).toISOString(),
                            createdAt: new Date(Date.now() - 172800000)
                        }
                    ];

                    // Guardar notificaciones de ejemplo
                    for (let msg of sampleMessages) {
                        await db.collection('notifications').add(msg);
                    }
                }
            } catch(error) {
                console.error('Error creating sample notifications:', error);
            }

            loadMessages();
        }
    });
</script>
</body>
