<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(function() { div.fadeOut(300, function() { $(this).remove(); }); }, 2500);
    }

    // Gerentes por defecto
    const defaultManagers = [
        {
            id: 1,
            name: "Daisy",
            position: "Gerente Principal de Reclutamiento",
            bio: "Hola, soy Daisy, gerente de reclutamiento de USHK. Tengo 30 años, graduada de la Universidad de Southampton. He ayudado a más de 800 personas a encontrar el trabajo adecuado.",
            telegram: "@Daisy_USHK"
        },
        {
            id: 2,
            name: "Amelia",
            position: "Gerente de Reclutamiento",
            bio: "Seis años de experiencia en reclutamiento en grandes empresas, especializada en atraer talento en áreas de internet, industria y bienes raíces.",
            telegram: "@Amelia_USHK"
        },
        {
            id: 3,
            name: "Clara",
            position: "Gerente de Reclutamiento",
            bio: "Hola, soy Clara, gerente de reclutamiento de USHK. Tengo amplia experiencia en atracción de talento y me enfoco en mejorar los procesos de contratación.",
            telegram: "@Clara_USHK"
        },
        {
            id: 4,
            name: "Lily",
            position: "Gerente Principal de Reclutamiento",
            bio: "Tengo más de cinco años de experiencia en reclutamiento, he ayudado a más de 1000 buscadores de empleo a encontrar el trabajo perfecto.",
            telegram: "@Lily_USHK"
        },
        {
            id: 5,
            name: "Sofía",
            position: "Gerente de Reclutamiento",
            bio: "Especialista en recursos humanos con experiencia internacional. Te ayudaré a encontrar las mejores oportunidades laborales en USHK.",
            telegram: "@Sofia_USHK"
        }
    ];

    async function loadManagers() {
        try {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            // Intentar cargar gerentes desde Firestore
            const managersRef = collection(db, 'recruitingManagers');
            const q = query(managersRef, limit(20));
            const querySnapshot = await getDocs(q);

            let managers = [];
            querySnapshot.forEach((doc) => {
                managers.push({
                    id: doc.id,
                    ...doc.data()
                });
            });

            // Si no hay gerentes en Firestore, usar los datos por defecto
            if (managers.length === 0) {
                managers = defaultManagers;
            }

            displayManagers(managers);

        } catch(e) {
            console.error('Error loading managers:', e);
            // Usar gerentes por defecto si hay error
            displayManagers(defaultManagers);
        }
    }

    function displayManagers(managers) {
        let html = '';
        
        for (let manager of managers) {
            const telegram = manager.telegram || '@USHK_support';
            
            html += `
                <div class="manager-card">
                    <div class="manager-avatar"><i class="fas fa-user-tie"></i></div>
                    <div class="manager-info">
                        <div class="manager-name">${manager.name || ''}</div>
                        <div class="manager-position">${manager.position || ''}</div>
                        <div class="manager-bio">${manager.bio || ''}</div>
                        <button class="contact-btn" onclick="window.contactManager('${manager.name}', '${telegram}')"><i class="fab fa-telegram"></i> Contactar</button>
                    </div>
                </div>
            `;
        }
        
        $('#managersList').html(html);
    }

    window.contactManager = function(name, telegram) {
        showMessage(`📞 Contactar a ${name}: ${telegram}`, 'success');
    }

    // Verificar autenticación
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            loadManagers();
        }
    });
</script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
