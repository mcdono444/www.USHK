    <style>

        .bottom-nav {

        /* --- Modal de Foto Completa --- */

        /* --- Botão flutuante de publicar (FAB) --- */

        .fab-publish i { color: white; font-size: 22px; }

        /* --- Painel de publicação --- */
        .pw-panel {
            position: fixed;
            right: 20px;

            max-height: 0;

            overflow: hidden;
            z-index: 999;

            transition: max-height 0.28s ease, opacity 0.2s ease;
            opacity: 0;
        }
        .pw-panel.pw-open {
            max-height: 80vh;
            opacity: 1;
            overflow-y: auto;
        }
        .pw-inner { padding: 16px; }
        .pw-title { font-size: 15px; font-weight: bold; color: #1a1a1a; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .pw-close { color: #999; font-size: 18px; cursor: pointer; padding: 4px; background: none; border: none; }
        
        .pw-user-input { margin-bottom: 14px; }
        .pw-label { font-size: 12px; color: #666; margin-bottom: 6px; display: block; font-weight: 600; }
        .pw-user-name { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 12px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
        
        .pw-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
        .pw-tab { flex: 1; text-align: center; padding: 9px; border-radius: 12px; background: #f0f2f5; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; border: 2px solid transparent; }
        .pw-tab.active { background: #f0fdf4; color: #16a34a; border-color: #22C55E; }
        .pw-field { margin-bottom: 12px; }
        .pw-file-btn { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; color: #666; font-size: 12px; background: none; }

        .pw-url-input, .pw-textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 12px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
        .pw-textarea { resize: vertical; min-height: 65px; }
        .pw-preview { margin-top: 10px; width: 100%; max-height: 180px; border-radius: 12px; object-fit: cover; display: none; }
        .pw-hint { font-size: 10px; color: #999; margin-top: 5px; }
        .pw-submit { width: 100%; background: #22C55E; color: white; border: none; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .pw-submit:disabled { opacity: 0.6; cursor: not-allowed; }

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
        getFirestore, collection, query, where, orderBy, limit, startAfter,
        getDocs, addDoc, onSnapshot, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
        authDomain: "proibidoreplica.firebaseapp.com",
        projectId: "proibidoreplica",
        storageBucket: "proibidoreplica.firebasestorage.app",
        messagingSenderId: "794009646952",
        appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    const POSTS_COLLECTION = 'wealth_posts';
    const PAGE_SIZE = 8;
    const MAX_IMAGE_CHARS = 700000;

    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('.app-container').append(div);
        setTimeout(function () { div.fadeOut(300, function () { $(this).remove(); }); }, 2800);
    }
    window.showMessage = showMessage;

    const feedContainer = document.getElementById('feedContainer');
    const feedStatus = document.getElementById('feedStatus');
    const photoModal = document.getElementById('photoModal');

    let lastVisible = null;
    let noMorePosts = false;
    let isLoadingMore = false;
    let renderedIds = new Set();

    function timeAgo(ts) {
        if (!ts || !ts.toDate) return '';
        const diffMs = Date.now() - ts.toDate().getTime();
        const min = Math.floor(diffMs / 60000);
        if (min < 1) return 'agora mesmo';
        if (min < 60) return min + ' min atrás';
        const h = Math.floor(min / 60);
        if (h < 24) return h + 'h atrás';
        const d = Math.floor(h / 24);
        return d + 'd atrás';
    }

    function escapeHtml(str) {
        return $('<div>').text(str || '').html();
    }

    // Modal de foto completa
    window.openPhotoModal = function(imageUrl, description, userName, createdAt) {
        document.getElementById('photoModalImage').src = imageUrl;
        document.getElementById('photoModalDesc').textContent = description;
        document.getElementById('photoModalAuthor').textContent = escapeHtml(userName || 'Usuário');
        document.getElementById('photoModalTime').textContent = timeAgo(createdAt);
        photoModal.classList.add('open');
    };

    window.closePhotoModal = function() {
        photoModal.classList.remove('open');
    };

    function renderPost(id, data, prepend) {
        if (renderedIds.has(id)) return;
        renderedIds.add(id);

        const card = $('<div class="post-card"></div>');
        const imgWrap = $('<div class="post-image-wrap"></div>');
        
        const img = $('<img loading="lazy">').attr('src', data.imageUrl);
        img.on('error', function () {
            $(this).closest('.post-image-wrap').html('<i class="fas fa-image" style="font-size:34px;color:#cbd5e1;"></i>');
        });
        
        const expandIcon = $('<div class="post-expand-icon"><i class="fas fa-expand"></i></div>');
        
        imgWrap.append(img).append(expandIcon);

        const body = $('<div class="post-body"></div>');
        body.append('<div class="post-desc">' + escapeHtml(data.description) + '</div>');

        const meta = $('<div class="post-meta"></div>');
        meta.append('<div class="post-avatar"><i class="fas fa-user"></i></div>');
        meta.append('<div class="post-author">' + escapeHtml(data.userName || 'Usuário') + '</div>');
        meta.append('<div class="post-time">' + timeAgo(data.createdAt) + '</div>');
        body.append(meta);

        card.append(imgWrap).append(body);

        // Clique para abrir modal
        card.on('click', function() {
            openPhotoModal(data.imageUrl, data.description, data.userName, data.createdAt);
        });

        if (prepend) {
            $(feedContainer).prepend(card);
        } else {
            $(feedContainer).append(card);
        }
    }

    function showEmptyState() {
        feedStatus.innerHTML = '';
        $(feedContainer).html(
            '<div class="feed-empty"><i class="fas fa-images"></i>' +
            '<div class="feed-empty-title">Sem mídias no momento</div>' +
            '<div class="feed-empty-sub">Quando houver fotos aprovadas, elas aparecerão aqui</div></div>'
        );
    }

    function showOfflineState() {
        feedStatus.innerHTML = '';
        $(feedContainer).html(
            '<div class="feed-empty offline"><i class="fas fa-wifi"></i>' +
            '<div class="feed-empty-title">Sem conexão com o servidor</div>' +
            '<div class="feed-empty-sub">A tentar reconectar automaticamente...</div></div>'
        );
    }

    async function loadMorePosts() {
        if (isLoadingMore || noMorePosts) return;
        isLoadingMore = true;
        if (renderedIds.size === 0) {
            $(feedStatus).html('<i class="fas fa-circle-notch fa-spin"></i> A carregar fotos...');
        }

        try {
            let q;
            if (lastVisible) {
                q = query(collection(db, POSTS_COLLECTION), where('status', '==', 'approved'), orderBy('createdAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE));
            } else {
                q = query(collection(db, POSTS_COLLECTION), where('status', '==', 'approved'), orderBy('createdAt', 'desc'), limit(PAGE_SIZE));
            }

            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                noMorePosts = true;
                if (renderedIds.size === 0) {
                    showEmptyState();
                } else {
                    $(feedStatus).html('<i class="fas fa-check-circle"></i> Você viu todas as fotos');
                }
                return;
            }

            snapshot.forEach(docSnap => renderPost(docSnap.id, docSnap.data(), false));
            lastVisible = snapshot.docs[snapshot.docs.length - 1];

            if (snapshot.docs.length < PAGE_SIZE) {
                noMorePosts = true;
                $(feedStatus).html('<i class="fas fa-check-circle"></i> Você viu todas as fotos');
            } else {
                $(feedStatus).html('');
            }
        } catch (err) {
            console.error('Erro ao carregar fotos:', err);
            if (renderedIds.size === 0) {
                showOfflineState();
            } else {
                $(feedStatus).html('<i class="fas fa-wifi" style="color:#ef4444;"></i> Sem conexão com o servidor');
            }
            setTimeout(() => { isLoadingMore = false; loadMorePosts(); }, 5000);
            return;
        } finally {
            isLoadingMore = false;
        }
    }

    window.addEventListener('scroll', function () {
        if (isLoadingMore || noMorePosts) return;
        const scrollBottom = window.innerHeight + window.scrollY;
        if (scrollBottom >= document.body.offsetHeight - 400) {
            loadMorePosts();
        }
    });

    function listenForNewPosts() {
        const q = query(collection(db, POSTS_COLLECTION), where('status', '==', 'approved'), orderBy('createdAt', 'desc'), limit(1));
        let firstLoad = true;
        onSnapshot(q, (snapshot) => {
            if (firstLoad) { firstLoad = false; return; }
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added' && !renderedIds.has(change.doc.id)) {
                    renderPost(change.doc.id, change.doc.data(), true);
                    showMessage('🎉 Nova foto na galeria!', 'success');
                }
            });
        }, (err) => console.error('Erro no listener em tempo real:', err));
    }

    /* --- PUBLICAR --- */
    let selectedMode = 'photo';
    let selectedImageData = null;
    let currentUserName = '';

    const fabPublish = document.getElementById('fabPublish');
    const pwPanel = document.getElementById('pwPanel');

    window.openPublishModal = function () {
        if (!token || !userId) {
            showMessage('Faça login para publicar uma foto', 'error');
            window.location.href = 'login.html';
            return;
        }

        selectedMode = 'photo';
        selectedImageData = null;
        currentUserName = (JSON.parse(localStorage.getItem('currentUser') || '{}').name) || '';

        $(fabPublish).addClass('fab-hidden');

        pwPanel.innerHTML =
            '<div class="pw-inner">' +
                '<div class="pw-title">Publicar foto <button class="pw-close" id="pwCloseBtn"><i class="fas fa-times"></i></button></div>' +
                '<div class="pw-user-input">' +
                    '<label class="pw-label">Seu nome</label>' +
                    '<input type="text" class="pw-user-name" id="pwUserName" placeholder="Digite seu nome" maxlength="50">' +
                '</div>' +
                '<div class="pw-tabs">' +
                    '<button class="pw-tab active" data-mode="photo"><i class="fas fa-camera"></i> Foto</button>' +
                    '<button class="pw-tab" data-mode="url"><i class="fas fa-link"></i> URL</button>' +
                '</div>' +
                '<div class="pw-field" id="pwPhotoField">' +
                    '<label class="pw-label">Escolha uma foto do dispositivo</label>' +
                    '<button class="pw-file-btn" id="pwFileBtn"><i class="fas fa-cloud-upload-alt"></i>Toque para escolher uma foto</button>' +
                    '<input type="file" accept="image/*" id="pwFileInput" style="display:none;">' +
                    '<div class="pw-hint">Tamanho máximo: 500KB. Fotos maiores não serão enviadas.</div>' +
                '</div>' +
                '<div class="pw-field" id="pwUrlField" style="display:none;">' +
                    '<label class="pw-label">Link da imagem</label>' +
                    '<input type="text" class="pw-url-input" id="pwUrlInput" placeholder="https://exemplo.com/imagem.jpg">' +
                '</div>' +
                '<img class="pw-preview" id="pwPreview">' +
                '<div class="pw-field">' +
                    '<label class="pw-label">Descrição</label>' +
                    '<textarea class="pw-textarea" id="pwDesc" maxlength="240" placeholder="Escreva uma descrição para a foto..."></textarea>' +
                '</div>' +
                '<button class="pw-submit" id="pwSubmitBtn">Enviar para publicação</button>' +
            '</div>';

        requestAnimationFrame(function () {
            $(pwPanel).addClass('pw-open');
        });

        const panel = $(pwPanel);

        // Preenche o nome do usuário
        panel.find('#pwUserName').val(currentUserName);

        panel.find('#pwCloseBtn').on('click', closePublishModal);

        panel.find('.pw-tab').on('click', function () {
            panel.find('.pw-tab').removeClass('active');
            $(this).addClass('active');
            selectedMode = $(this).data('mode');
            selectedImageData = null;
            panel.find('#pwPreview').hide().attr('src', '');
            if (selectedMode === 'photo') {
                panel.find('#pwPhotoField').show();
                panel.find('#pwUrlField').hide();
            } else {
                panel.find('#pwPhotoField').hide();
                panel.find('#pwUrlField').show();
            }
        });

        panel.find('#pwFileBtn').on('click', function () { panel.find('#pwFileInput').trigger('click'); });

        panel.find('#pwFileInput').on('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showMessage('Selecione um arquivo de imagem válido', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (evt) {
                const base64 = evt.target.result;
                if (base64.length > MAX_IMAGE_CHARS) {
                    showMessage('Foto muito grande. Escolha uma imagem menor (máx. 500KB) — não foi salva.', 'error');
                    selectedImageData = null;
                    panel.find('#pwPreview').hide().attr('src', '');
                    panel.find('#pwFileInput').val('');
                    return;
                }
                selectedImageData = base64;
                panel.find('#pwPreview').attr('src', base64).show();
            };
            reader.readAsDataURL(file);
        });

        panel.find('#pwUrlInput').on('input', function () {
            const url = $(this).val().trim();
            selectedImageData = url || null;
            if (url) {
                panel.find('#pwPreview').attr('src', url).show();
            } else {
                panel.find('#pwPreview').hide().attr('src', '');
            }
        });

        panel.find('#pwSubmitBtn').on('click', submitPost);
    };

    function closePublishModal() {
        $(pwPanel).removeClass('pw-open');
        $(fabPublish).removeClass('fab-hidden');
        setTimeout(function () { pwPanel.innerHTML = ''; }, 280);
    }
    window.closePublishModal = closePublishModal;

    async function submitPost() {
        const panel = $(pwPanel);
        const userName = panel.find('#pwUserName').val().trim();
        const description = panel.find('#pwDesc').val().trim();

        if (!userName) {
            showMessage('Digite seu nome', 'error');
            return;
        }
        if (!selectedImageData) {
            showMessage(selectedMode === 'photo' ? 'Escolha uma foto primeiro' : 'Cole o link da imagem', 'error');
            return;
        }
        if (selectedImageData.length > MAX_IMAGE_CHARS) {
            showMessage('Foto muito grande. Não foi salva.', 'error');
            return;
        }
        if (!description) {
            showMessage('Escreva uma descrição para a foto', 'error');
            return;
        }

        const btn = panel.find('#pwSubmitBtn');
        btn.prop('disabled', true).text('A enviar...');

        try {
            await addDoc(collection(db, POSTS_COLLECTION), {
                userId: userId,
                userName: userName,
                imageUrl: selectedImageData,
                description: description,
                status: 'pending',
                createdAt: serverTimestamp()
            });

            showMessage('Foto enviada! Aguarde a aprovação da administração.', 'success');
            closePublishModal();
        } catch (err) {
            console.error('Erro ao publicar:', err);
            showMessage('Sem conexão com o servidor. Tente novamente.', 'error');
            btn.prop('disabled', false).text('Enviar para publicação');
        }
    }

    /* --- INIT --- */
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            loadMorePosts();
            listenForNewPosts();
        }
    }, (err) => {
        console.error('Erro de autenticação:', err);
        showOfflineState();
    });
</script>
</body>
</html>
