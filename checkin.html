    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a5d2a 0%, #0d3e1a 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
        .app-container { max-width: 430px; margin: 0 auto; background: transparent; min-height: 100vh; padding-bottom: 80px; }
        
        .header-section { padding: 20px 15px 40px; text-align: center; position: relative; }
        .back-btn { color: white; font-size: 20px; text-decoration: none; position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.3); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .challenge-title { color: white; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .challenge-description { color: white; font-size: 14px; opacity: 0.9; }
        
        .balance-card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 12px 20px; margin: 0 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .balance-value { font-size: 20px; font-weight: bold; color: #22C55E; }
        
        .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 20px 15px; }
        .day-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .day-icon { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; background: rgba(255,255,255,0.2); color: white; transition: all 0.3s; }
        .day-icon.checked { background: #FFD700; color: #333; }
        .day-icon.current { border: 3px solid #FFD700; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .day-label { color: white; font-size: 11px; opacity: 0.8; }
        
        .checkin-button { width: calc(100% - 30px); margin: 10px 15px; background: linear-gradient(135deg, #FFD700, #FFA500); border: none; border-radius: 50px; padding: 16px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .checkin-button:disabled { background: #999; cursor: not-allowed; opacity: 0.6; }
        
        .reward-text { text-align: center; color: white; font-size: 13px; margin: 10px 15px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 20px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #22C55E; display: flex; justify-content: space-around; padding: 8px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; color: white; flex: 1; }
        .nav-icon i { font-size: 20px; }
        .nav-label { font-size: 9px; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 50px; z-index: 10001; font-size: 14px; font-weight: bold; }
        .toast.success { background: #dcfce7; color: #166534; }
        .toast.error { background: #fee2e2; color: #b91c1c; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 28px; width: 85%; max-width: 300px; text-align: center; overflow: hidden; }
        .modal-header { background: linear-gradient(135deg, #FFD700, #FFA500); padding: 20px; color: #333; }
        .modal-header i { font-size: 40px; margin-bottom: 10px; }
        .modal-body { padding: 20px; }
        .modal-reward { font-size: 28px; font-weight: bold; color: #22C55E; margin: 10px 0; }
        .modal-btn { background: #22C55E; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }

<body>
<div class="app-container">
    <div class="header-section">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="challenge-title">Desafío de 10 Días</div>
        <div class="challenge-description">Cada registro diario te da <strong>1 kz</strong> de recompensa</div>
    </div>
    
    <div class="balance-card">
        <span>💰 Tu saldo</span>
        <span class="balance-value" id="userBalance">0 kz</span>
    </div>
    
    <div class="days-grid" id="daysGrid"></div>
    
    <button class="checkin-button" id="checkinBtn" onclick="doCheckIn()">
        <i class="fas fa-calendar-check"></i> Registrar asistencia ahora
    </button>
    <div class="reward-text" id="rewardInfo">✨ Recompensa de hoy: 1 kz ✨</div>
</div>

<footer class="bottom-nav">
    <a class="nav-item" href="index.html"><div class="nav-icon"><i class="fas fa-home"></i></div><div class="nav-label">Inicio</div></a>

    <a class="nav-item" href="income.html"><div class="nav-icon"><i class="fas fa-gem"></i></div><div class="nav-label">Ganancias</div></a>
    <a class="nav-item" href="mytask.html"><div class="nav-icon"><i class="fas fa-tasks"></i></div><div class="nav-label">Tareas</div></a>
    <a class="nav-item" href="profile.html"><div class="nav-icon"><i class="fas fa-user"></i></div><div class="nav-label">Mi Cuenta</div></a>
</footer>

<div id="resultModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <i class="fas fa-gift"></i>
            <h3>¡Registro exitoso!</h3>
        </div>
        <div class="modal-body">
            <p>Has ganado</p>
            <div class="modal-reward" id="modalReward">1 kz</div>
            <button class="modal-btn" onclick="closeResultModal()">Continuar</button>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    let checkedDays = [];
    let lastCheckin = null;

    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(() => div.fadeOut(300, () => div.remove()), 2500);
    }

    async function loadBalance() {
        try {
            if (!userId) return;
            const userDocRef = doc(db, 'users', userId);
            const userSnapshot = await getDoc(userDocRef);
            
            if (userSnapshot.exists()) {
                const userData = userSnapshot.data();
                const balance = userData.balance || 0;
                $('#userBalance').text(balance.toFixed(2) + ' kz');
            }
        } catch(e) { 
            console.error('Balance error:', e); 
        }
    }

    async function loadCheckinStatus() {
        try {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            const userDocRef = doc(db, 'users', userId);
            const userSnapshot = await getDoc(userDocRef);
            
            if (userSnapshot.exists()) {
                const userData = userSnapshot.data();
                checkedDays = userData.checkedDays || [];
                lastCheckin = userData.lastCheckinDate || null;
                
                const today = new Date().toDateString();
                
                if (lastCheckin === today) {
                    $('#checkinBtn').prop('disabled', true);
                    $('#checkinBtn').html('<i class="fas fa-check"></i> Ya has registrado asistencia hoy');
                    $('#rewardInfo').text('✅ Ya has registrado asistencia hoy! Vuelve mañana.');
                } else {
                    const nextDay = (checkedDays.length || 0) + 1;
                    if (nextDay > 10) {
                        $('#checkinBtn').prop('disabled', true);
                        $('#checkinBtn').html('<i class="fas fa-trophy"></i> ¡Desafío completado!');
                        $('#rewardInfo').text('🎉 ¡Felicidades! Has completado los 10 días! 🎉');
                    } else {
                        $('#checkinBtn').prop('disabled', false);
                        $('#checkinBtn').html('<i class="fas fa-calendar-check"></i> Registrar asistencia ahora');
                        $('#rewardInfo').text(`✨ Recompensa de hoy: 1 kz - Día ${nextDay} de 10 ✨`);
                    }
                }
            }
            
            renderDays();
        } catch(e) {
            console.error('Checkin error:', e);
            renderDays();
            showMessage('Error al cargar datos: ' + e.message, 'error');
        }
    }

    function renderDays() {
        let html = '';
        for (let i = 1; i <= 10; i++) {
            const isChecked = checkedDays.includes(i);
            const today = new Date().toDateString();
            const isCurrent = (lastCheckin !== today && i === (checkedDays.length + 1) && checkedDays.length < 10);
            let statusClass = '';
            let icon = '';
            
            if (isChecked) {
                statusClass = 'checked';
                icon = '✓';
            } else if (isCurrent) {
                statusClass = 'current';
                icon = i;
            } else {
                statusClass = '';
                icon = i;
            }
            
            html += `
                <div class="day-item">
                    <div class="day-icon ${statusClass}">${icon}</div>
                    <div class="day-label">Día ${i}</div>
                </div>
            `;
        }
        $('#daysGrid').html(html);
    }

    window.closeResultModal = function() {
        $('#resultModal').removeClass('active');
        loadCheckinStatus();
        loadBalance();
    }

    window.doCheckIn = async function() {
        const btn = $('#checkinBtn');
        if (btn.prop('disabled')) return;
        
        btn.prop('disabled', true);
        btn.html('<i class="fas fa-spinner fa-spin"></i> Procesando...');
        
        try {
            if (!userId) {
                showMessage('Usuario no válido', 'error');
                btn.prop('disabled', false);
                btn.html('<i class="fas fa-calendar-check"></i> Registrar asistencia ahora');
                return;
            }

            const userDocRef = doc(db, 'users', userId);
            const userSnapshot = await getDoc(userDocRef);
            
            if (!userSnapshot.exists()) {
                showMessage('Usuario no encontrado', 'error');
                btn.prop('disabled', false);
                btn.html('<i class="fas fa-calendar-check"></i> Registrar asistencia ahora');
                return;
            }

            const userData = userSnapshot.data();
            const today = new Date().toDateString();
            const lastCheckinDate = userData.lastCheckinDate || null;
            
            // Verificar si ya registró hoy
            if (lastCheckinDate === today) {
                showMessage('Ya has registrado asistencia hoy!', 'error');
                btn.prop('disabled', false);
                btn.html('<i class="fas fa-calendar-check"></i> Registrar asistencia ahora');
                return;
            }

            // Verificar si completó los 10 días
            const checkedDaysArray = userData.checkedDays || [];
            if (checkedDaysArray.length >= 10) {
                showMessage('¡Desafío completado!', 'success');
                btn.prop('disabled', false);
                btn.html('<i class="fas fa-calendar-check"></i> Registrar asistencia ahora');
                return;
            }

            const nextDay = checkedDaysArray.length + 1;
            const reward = 1; // 1 kz por día

            // Actualizar datos del usuario
            const newCheckedDays = [...checkedDaysArray, nextDay];
            await updateDoc(userDocRef, {
                checkedDays: newCheckedDays,
                lastCheckinDate: today,
                balance: increment(reward),
                updatedAt: new Date().toISOString()
            });

            $('#modalReward').text(reward + ' kz');
            $('#resultModal').addClass('active');
            showMessage(`✅ ¡Registro exitoso! +${reward} kz`, 'success');
            loadBalance();

        } catch(e) {
            console.error('Checkin error:', e);
            showMessage('Error de red: ' + e.message, 'error');
            btn.prop('disabled', false);
            btn.html('<i class="fas fa-calendar-check"></i> Registrar asistencia ahora');
        }
    }

    // Verificar autenticación
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            loadBalance();
            loadCheckinStatus();
        }
    });
</script>
</body>
