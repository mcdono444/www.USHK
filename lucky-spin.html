<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    async function loadBalance() {
        try {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            const userDocRef = doc(db, 'users', userId);
            const userSnapshot = await getDoc(userDocRef);
            
            if (userSnapshot.exists()) {
                const userData = userSnapshot.data();
                document.getElementById('userBalance').innerHTML = (userData.balance || 0).toFixed(2) + ' MZN';
            }
        } catch(e) { 
            console.error('Error loading balance:', e); 
        }
    }

    // Verificar autenticação
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            loadBalance();
        }
    });
</script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
