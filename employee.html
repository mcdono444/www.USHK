<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken');
    const userId = localStorage.getItem('userId');

    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(function() { div.fadeOut(300, function() { $(this).remove(); }); }, 2500);
    }

    // Empleados destacados por defecto
    const defaultStaff = [
        {
            id: 1,
            name: "Ahmed Mansouri",
            position: "Director General - Gerente VIP",
            bio: "Destacado en liderazgo de equipo y cumplimiento de objetivos corporativos. Ganador del premio al Mejor Empleado 2025.",

        },
        {
            id: 2,
            name: "Sara Naqibi",
            position: "Supervisora de Marketing",
            bio: "Contribuyó a aumentar las ventas en un 150% en un año. Ganadora del premio a la Innovación.",
            badge: "📈 Modelo de Excelencia",
            icon: "fa-user-graduate"
        },
        {
            id: 3,
            name: "Mohamed Abdullah",
            position: "Gerente de Desarrollo de Negocios",
            bio: "Estableció alianzas estratégicas con grandes empresas y contribuyó a la expansión de la plataforma.",
            badge: "🤝 Mejor Alianza",
            icon: "fa-user"
        },
        {
            id: 4,
            name: "Fátima Zahra",
            position: "Directora de Servicio al Cliente",
            bio: "Obtuvo la calificación más alta en satisfacción del cliente y lideró al equipo de soporte a cifras récord.",
            badge: "❤️ Premio al Servicio al Cliente",
            icon: "fa-user-tie"
        },
        {
            id: 5,
            name: "Omar Khalid",
            position: "Desarrollador Técnico",
            bio: "Desarrolló la plataforma USHK y mejoró el rendimiento del sistema en un 80%.",
            badge: "💻 Premio a la Innovación Técnica",
            icon: "fa-user"
        },
        {
            id: 6,
            name: "Carlos Mendoza",
            position: "Gerente de Ventas Mozambique",
            bio: "Líder en ventas para la región de Mozambique, expandió la base de usuarios en un 200% en 6 meses.",
            badge: "📊 Top Ventas Mozambique",
            icon: "fa-user"
        }
    ];

    async function loadEmployees() {
        try {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            // Intentar cargar empleados desde Firestore
            const employeesRef = collection(db, 'employees');
            const q = query(employeesRef, orderBy('rank', 'asc'), limit(20));
            const querySnapshot = await getDocs(q);

            let employees = [];
            querySnapshot.forEach((doc) => {
                employees.push({
                    id: doc.id,
                    ...doc.data()
                });
            });

            // Si no hay empleados en Firestore, usar los datos por defecto
            if (employees.length === 0) {
                employees = defaultStaff;
            }

            displayEmployees(employees);

        } catch(e) {
            console.error('Error loading employees:', e);
            // Usar empleados por defecto si hay error
            displayEmployees(defaultStaff);
        }
    }

    function displayEmployees(employees) {
        let html = '';
        
        for (let employee of employees) {
            const badgeText = employee.badge || '⭐ Empleado Destacado';
            const icon = employee.icon || 'fa-user';
            
            html += `
                <div class="staff-card">
                    <div class="staff-avatar"><i class="fas ${icon}"></i></div>
                    <div class="staff-info">
                        <div class="staff-name">${employee.name || employee.nombreEmpleado || ''}</div>
                        <div class="staff-position">${employee.position || employee.cargo || ''}</div>
                        <div class="staff-bio">${employee.bio || employee.descripcion || ''}</div>
                        <div class="staff-badge">${badgeText}</div>
                    </div>
                </div>
            `;
        }
        
        $('#staffList').html(html);
    }

    // Verificar autenticación
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            loadEmployees();
        }
    });
</script>
