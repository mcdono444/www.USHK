<script>if(!localStorage.getItem('currentUser')){window.location.href='login.html';}</script>

            <div class="empty-state"><div class="empty-icon"><i class="fas fa-envelope-open"></i></div><div class="empty-text">No hay notificaciones no leídas</div></div>

<script>
    var currentTab = 'unread';
    var messages = [];
    const userId = localStorage.getItem('userId');
    
    // Esperar Firebase estar pronto
    function getFirebase() {
        return new Promise((resolve) => {
            const checkInterval = setInterval(() => {
                if (window.firebaseModules) {
                    clearInterval(checkInterval);
                    resolve(window.firebaseModules);
                }
            }, 100);
        });
    }
    
    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(function() { div.fadeOut(300, function() { $(this).remove(); }); }, 2500);
    }
    
    async function loadMessages() {
        try {
            const { db, collection, query, where, getDocs, orderBy } = await getFirebase();
            
            // Consultar notificaciones del usuario ordenadas por fecha descendente
            const notificationsRef = collection(db, 'notifications');
            const q = query(
                notificationsRef, 
                where('userId', '==', userId),
                orderBy('date', 'desc')
            );
            
            const querySnapshot = await getDocs(q);
            messages = [];
            
            querySnapshot.forEach((doc) => {
                messages.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            
            renderMessages();
        } catch(e) {
            console.error('Error loading messages:', e);
        }
    }
    
    async function markAsRead(msgId) {
        try {
            const { db, doc, updateDoc } = await getFirebase();
            
            // Actualizar estado del mensaje a read en Firestore
            const notificationRef = doc(db, 'notifications', msgId);
            await updateDoc(notificationRef, {
                status: 'read'
            });
            
            // Actualizar en el array local
            for (var i = 0; i < messages.length; i++) {
                if (messages[i].id === msgId) {
                    messages[i].status = 'read';
                    break;
                }
            }
            
            renderMessages();
        } catch(e) {
            console.error('Error marking as read:', e);
            showMessage('Error al marcar como leído', 'error');
        }
    }
    
    function renderMessages() {
        var unreadList = messages.filter(function(m) { return m.status !== 'read'; });
        var readList = messages.filter(function(m) { return m.status === 'read'; });
        
        renderList('Unread', unreadList);
        renderList('Read', readList);
    }
    
    function renderList(tab, list) {
        var container = $('#messagesList' + tab);
        var isUnread = (tab === 'Unread');
        
        if (list.length === 0) {
            var emptyText = isUnread ? 'No hay notificaciones no leídas' : 'No hay notificaciones leídas';
            container.html('<div class="empty-state"><div class="empty-icon"><i class="fas fa-envelope-open"></i></div><div class="empty-text">' + emptyText + '</div></div>');
            return;
        }
        
        var html = '';
        for (var i = 0; i < list.length; i++) {
            var msg = list[i];
            html += '<div class="message-card" data-id="' + msg.id + '">';
            html += '<div class="message-content collapsed">' + msg.content + '</div>';
            html += '<div class="message-toggle" onclick="toggleMessage(this)"><i class="fas fa-chevron-down"></i><span>Expandir</span></div>';
            html += '<div class="message-date"><i class="fas fa-clock"></i> ' + new Date(msg.date).toLocaleString('es-MZ') + '</div>';
            if (isUnread) {
                html += '<div style="margin-top: 10px;"><button class="mark-read-btn" onclick="markAsRead(\'' + msg.id + '\')" style="background:#22C55E; color:white; border:none; padding:5px 12px; border-radius:20px; font-size:11px; cursor:pointer;"><i class="fas fa-check"></i> Marcar como leído</button></div>';
            }
            html += '</div>';
        }
        container.html(html);
    }
    
    function toggleMessage(el) {
        var card = $(el).closest('.message-card');
        var content = card.find('.message-content');
        var icon = $(el).find('i');
        var text = $(el).find('span');
        
        if (content.hasClass('collapsed')) {
            content.removeClass('collapsed');
            icon.css('transform', 'rotate(180deg)');
            text.text('Contraer');
        } else {
            content.addClass('collapsed');
            icon.css('transform', 'rotate(0deg)');
            text.text('Expandir');
        }
    }
    
    $('.tab-item').on('click', function() {
        var tab = $(this).data('tab');
        if (tab === currentTab) return;
        currentTab = tab;
        $('.tab-item').removeClass('active');
        $(this).addClass('active');
        $('#messagesListUnread, #messagesListRead').addClass('hidden');
        $('#messagesList' + (tab === 'unread' ? 'Unread' : 'Read')).removeClass('hidden');
    });
    
    // Inicializar con datos de ejemplo si es primera vez
    async function initializeSampleNotifications() {
        try {
            const { db, collection, query, where, getDocs, setDoc, doc } = await getFirebase();
            
            // Verificar si el usuario ya tiene notificaciones
            const notificationsRef = collection(db, 'notifications');
            const q = query(notificationsRef, where('userId', '==', userId));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                // Crear notificaciones de ejemplo
                const sampleNotifications = [
                    {
                        userId: userId,
                        content: '¡Bienvenido a la plataforma USHK! Te deseamos una experiencia agradable.',
                        status: 'unread',
                        date: new Date().toISOString()
                    },
                    {
                        userId: userId,
                        content: 'Tu cuenta ha sido activada exitosamente. Ahora puedes comenzar a invertir.',
                        status: 'unread',
                        date: new Date(Date.now() - 86400000).toISOString()
                    },
                    {
                        userId: userId,
                        content: 'Oferta especial: Obtén un bono del 10% al depositar tus primeros 1000 MZN durante los próximos 7 días.',
                        status: 'read',
                        date: new Date(Date.now() - 172800000).toISOString()
                    }
                ];
                
                for (let i = 0; i < sampleNotifications.length; i++) {
                    const docRef = doc(collection(db, 'notifications'));
                    await setDoc(docRef, sampleNotifications[i]);
                }
            }
        } catch(e) {
            console.error('Error initializing notifications:', e);
        }
    }
    
    // Función de inicialización
    async function init() {
        if (!userId) {
            window.location.href = 'login.html';
            return;
        }
        
        await initializeSampleNotifications();
        await loadMessages();
        
        // Recargar mensajes cada 30 segundos
        setInterval(loadMessages, 30000);
    }
    
    // Iniciar cuando esté listo
    init();
</script>
