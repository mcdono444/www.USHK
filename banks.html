    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f0f2f5;font-family:sans-serif;padding-bottom:70px}
        .container{max-width:430px;margin:0 auto;background:#fff;padding-bottom:20px}
        .header{background:linear-gradient(135deg,#1a5d2a,#0d3e1a);padding:20px;text-align:center;color:white}
        .bank-card{background:linear-gradient(135deg,#1a5d2a,#0d3e1a);border-radius:16px;padding:20px;margin:15px;color:white}
        .bank-name{font-size:16px;font-weight:bold;margin-bottom:10px}
        .bank-holder{font-size:13px;margin-bottom:5px;opacity:0.9}
        .bank-account{font-size:12px;font-family:monospace;opacity:0.8}
        .delete-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 16px;border-radius:30px;margin-top:10px;cursor:pointer}
        .add-btn{display:block;background:#22C55E;color:white;text-align:center;padding:15px;margin:15px;border-radius:30px;text-decoration:none;border:none;cursor:pointer}
        .empty{text-align:center;padding:60px;color:#999}
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#22C55E;display:flex;justify-content:space-around;padding:8px 0}
        .nav-item{text-decoration:none;color:white;text-align:center;flex:1;font-size:10px}
        .nav-icon{font-size:20px;display:block}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:50px;z-index:1000}
        .toast.success{background:#dcfce7;color:#166534}
        .toast.error{background:#fee2e2;color:#b91c1c}
        /* layout do formulário (mínimo) */
        .form-section{padding:15px}
        .form-field{margin-bottom:10px}
        .form-field label{display:block;font-size:13px;margin-bottom:4px}
        .form-field input{width:100%;padding:8px;border-radius:6px;border:1px solid #ddd}
        .hidden{display:none}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2>Minhas Contas Bancárias</h2></div>

    <!-- Formulário para adicionar e salvar conta -->
    <div id="formWrapper" class="form-section">
        <div class="form-field">
            <label for="inputName">Nome do titular</label>
            <input id="inputName" type="text" placeholder="Nome completo">
        </div>
        <div class="form-field">
            <label for="inputBank">Banco</label>
            <input id="inputBank" type="text" placeholder="Nome do banco (ex.: USH)">
        </div>
        <div class="form-field">
            <label for="inputAccount">Número da conta / IBAN</label>
            <input id="inputAccount" type="text" placeholder="Número da conta ou IBAN">
        </div>
        <div class="form-field">
            <label for="inputDoc">Documento (opcional)</label>
            <input id="inputDoc" type="text" placeholder="Documento / ID">
        </div>
    </div>

    <div id="banksList"></div>

    <!-- Botão ADICIONAR que grava os dados sem abrir outra página -->
    <button id="addAccountBtn" class="add-btn">+ Adicionar Conta</button>
</div>

<footer class="bottom-nav">
    <a class="nav-item" href="index.html"><div class="nav-icon"><i class="fas fa-home"></i></div>Início</a>
    <a class="nav-item" href="profile.html"><div class="nav-icon"><i class="fas fa-user"></i></div>Conta</a>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
        getFirestore,
        doc,
        collection,
        query,
        where,
        deleteDoc,
        addDoc,
        onSnapshot,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
        authDomain: "proibidoreplica.firebaseapp.com",
        projectId: "proibidoreplica",
        storageBucket: "proibidoreplica.firebasestorage.app",
        messagingSenderId: "794009646952",
        appId: "1:794009646952:web:dfdde843496e8a160e88dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { auth, db };

    const token = localStorage.getItem('userToken'); // assume autenticação salva localmente
    const userId = localStorage.getItem('userId');

    function showMessage(msg, type) {
        const d = document.createElement('div');
        d.className = 'toast ' + type;
        d.innerHTML = msg;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }

    // Estado local
    let unsubscribeBanks = null;
    let currentBanks = []; // contas existentes para o usuário

    // Listener em tempo real (Firestore) — sem fallback local
    function listenBanksRealtime() {
        if (!userId) return;
        const banksRef = collection(db, 'bankAccounts');
        const q = query(banksRef, where('userId', '==', userId));

        if (unsubscribeBanks) unsubscribeBanks();

        unsubscribeBanks = onSnapshot(q, (snapshot) => {
            currentBanks = [];
            snapshot.forEach(d => currentBanks.push({ id: d.id, ...d.data() }));

            if (currentBanks.length > 0) {
                // existe pelo menos uma conta salva: mostrar lista e ocultar formulário e botão adicionar
                displayBanks(currentBanks);
                document.getElementById('formWrapper').classList.add('hidden');
                document.getElementById('addAccountBtn').classList.add('hidden');
            } else {
                // nenhuma conta salva: mostrar formulário e botão adicionar
                document.getElementById('formWrapper').classList.remove('hidden');
                document.getElementById('addAccountBtn').classList.remove('hidden');
                document.getElementById('banksList').innerHTML = '<div class="empty"><i class="fas fa-university" style="font-size:50px;margin-bottom:15px;display:block"></i>Não há contas bancárias</div>';
            }
        }, (err) => {
            console.error('Erro no listener em tempo real:', err);
            // Em caso de erro, mostramos mensagem e lista vazia (não usamos armazenamento local)
            document.getElementById('banksList').innerHTML = '<div class="empty"><i class="fas fa-university" style="font-size:50px;margin-bottom:15px;display:block"></i>Não foi possível carregar as contas</div>';
            showMessage('Erro ao carregar contas. Tente novamente.', 'error');
        });
    }

    function displayBanks(banks) {
        let html = '';
        for (const b of banks) {
            html += `
                <div class="bank-card">
                    <div class="bank-name"><i class="fas fa-university"></i> ${escapeHtml(b.bank || b.bankName || 'Banco')}</div>
                    <div class="bank-holder"><i class="fas fa-user"></i> ${escapeHtml(b.name || b.accountName || b.accountHolder || 'Usuário')}</div>
                    <div class="bank-account"><i class="fas fa-credit-card"></i> ${escapeHtml(b.account || b.accountNumber || 'N/A')}</div>
                    ${b.document ? `<div class="bank-account"><i class="fas fa-id-card"></i> ${escapeHtml(b.document)}</div>` : ''}
                    <button class="delete-btn" onclick="window.deleteBank('${b.id}')"><i class="fas fa-trash"></i> Excluir</button>
                </div>
            `;
        }
        document.getElementById('banksList').innerHTML = html;
    }

    // Pequeno helper para evitar XSS na injeção de valores
    function escapeHtml(str) {
        if (!str && str !== 0) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    // Excluir conta no Firestore
    window.deleteBank = async function(docId) {
        if (!confirm('Excluir esta conta?')) return;

        try {
            if (!userId) {
                showMessage('Usuário inválido', 'error');
                return;
            }
            const bankRef = doc(db, 'bankAccounts', docId);
            await deleteDoc(bankRef);
            showMessage('Conta excluída', 'success');
            // onSnapshot cuidará de reexibir o formulário e o botão
        } catch (e) {
            console.error('Erro ao excluir conta:', e);
            showMessage('Erro ao excluir conta. Tente novamente.', 'error');
        }
    };

    // Salvar novo registro — acionado pelo botão "+ Adicionar Conta"
    async function saveBankViaAddButton() {
        const name = document.getElementById('inputName').value.trim();
        const bank = document.getElementById('inputBank').value.trim();
        const account = document.getElementById('inputAccount').value.trim();
        const documentVal = document.getElementById('inputDoc').value.trim();

        if (!userId) {
            showMessage('Usuário não autenticado', 'error');
            return;
        }

        // impedir adicionar se já existe conta salva
        if (currentBanks.length > 0) {
            showMessage('Já existe uma conta ativa. Exclua-a para adicionar outra.', 'error');
            return;
        }
        if (!name || !bank || !account) {
            showMessage('Preencha Nome, Banco e Número da conta/IBAN', 'error');
            return;
        }

        const data = {
            userId,
            name,
            bank,
            account,
            document: documentVal || '',
            createdAt: serverTimestamp()
        };

        try {
            await addDoc(collection(db, 'bankAccounts'), data);
            showMessage('Conta salva', 'success');
            // limpar campos; o listener em tempo real esconderá o formulário e o botão
            document.getElementById('inputName').value = '';
            document.getElementById('inputBank').value = '';
            document.getElementById('inputAccount').value = '';
            document.getElementById('inputDoc').value = '';
        } catch (e) {
            console.error('Erro ao salvar conta:', e);
            showMessage('Erro ao salvar conta. Tente novamente.', 'error');
        }
    }

    // Conectar evento do botão add (não abre página)
    document.getElementById('addAccountBtn').addEventListener('click', saveBankViaAddButton);

    // Autenticação e inicialização do listener
    onAuthStateChanged(auth, (user) => {
        if (!user || !token || !userId) {
            window.location.href = 'login.html';
        } else {
            listenBanksRealtime();
        }
    });
</script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
