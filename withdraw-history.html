<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
            apiKey: "AIzaSyDiuy0PRKp4b8G9xbpj3ro4LbA_Tybt2W8",
            authDomain: "proibidoreplica.firebaseapp.com",
            projectId: "proibidoreplica",
            storageBucket: "proibidoreplica.firebasestorage.app",
            messagingSenderId: "794009646952",
            appId: "1:794009646952:web:dfdde843496e8a160e88dd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Disponibilizar globalmente para o script abaixo
  window.firebaseModules = { auth, db, collection, query, where, getDocs };

  // Aguarda a confirmação de que o usuário está de fato autenticado no
  // Firebase (não só presente no localStorage) antes de liberar a busca.
  onAuthStateChanged(auth, (user) => {
    const storedUserId = localStorage.getItem('userId');
    if (!user || !storedUserId) {
      window.location.href = 'login.html';
      return;
    }
    window.firebaseAuthReady = true;
    window.firebaseCurrentUserId = user.uid;
  });
</script>

<script>
const userId = localStorage.getItem('userId');

if (!userId) window.location.href = 'login.html';

// Esperar Firebase estar pronto (módulo inicializado) E o usuário autenticado
function getFirebase() {
    return new Promise((resolve) => {
        const checkInterval = setInterval(() => {
            if (window.firebaseModules && window.firebaseAuthReady) {
                clearInterval(checkInterval);
                resolve(window.firebaseModules);
            }
        }, 100);
    });
}

function showMessage(msg, type) {
    var div = $('<div class="toast ' + type + '">' + msg + '</div>');
    $('body').append(div);
    setTimeout(() => div.fadeOut(300, () => div.remove()), 2500);
}

function getStatusClass(status) {
    if (status === 'pending') return 'pending';
    if (status === 'completed' || status === 'approved') return 'completed';
    if (status === 'rejected') return 'rejected';
    return 'pending';
}

function getStatusText(status) {
    if (status === 'pending') return '⏳ Pendiente';
    if (status === 'completed' || status === 'approved') return '✅ Completado';
    if (status === 'rejected') return '❌ Rechazado';
    return '⏳ Pendiente';
}

function getStatusBadgeClass(status) {
    if (status === 'pending') return 'status-pending';
    if (status === 'completed' || status === 'approved') return 'status-completed';
    if (status === 'rejected') return 'status-rejected';
    return 'status-pending';
}

async function loadWithdrawals() {
    try {
        $('#withdrawalsList').html('<div class="empty-state"><div class="empty-icon"><i class="fas fa-spinner fa-spin"></i></div><div class="empty-text">Cargando historial...</div></div>');
        
        const { db, collection, query, where, getDocs } = await getFirebase();
        
        // Consultar retiradas do usuário logado no Firestore (coleção correta: withdrawals).
        // Usa o uid confirmado pelo Firebase Auth; cai para o localStorage só se necessário.
        const effectiveUserId = window.firebaseCurrentUserId || userId;
        const withdrawalsRef = collection(db, 'withdrawals');
        const q = query(withdrawalsRef, where('userId', '==', effectiveUserId));
        const querySnapshot = await getDocs(q);
        
        let withdrawals = [];
        querySnapshot.forEach((doc) => {
            withdrawals.push({ id: doc.id, ...doc.data() });
        });
        
        // Ordenar por data decrescente
        withdrawals.sort((a, b) => {
            const dateA = new Date(a.date).getTime();
            const dateB = new Date(b.date).getTime();
            return dateB - dateA;
        });
        
        console.log('Withdrawals data:', withdrawals);
        
        if (withdrawals.length === 0) {
            $('#withdrawalsList').html(`
                <div class="empty-state">
                    <div class="empty-icon"><i class="fas fa-history"></i></div>
                    <div class="empty-text">No hay solicitudes de retiro</div>
                </div>
            `);
            return;
        }
        
        let html = '';
        for (let w of withdrawals) {
            const statusClass = getStatusClass(w.status);
            const badgeClass = getStatusBadgeClass(w.status);
            const statusText = getStatusText(w.status);
            const feeAmount = w.fee || (w.amount * 0.14);
            const netAmount = w.netAmount || (w.amount - feeAmount);
            const orderNumber = w.orderNumber || w.id || '-';
            
            html += `
                <div class="withdraw-card ${statusClass}">
                    <div class="withdraw-header">
                        <span class="withdraw-amount">${(w.amount || 0).toLocaleString()} kz</span>
                        <span class="withdraw-status ${badgeClass}">${statusText}</span>
                    </div>
                    <div class="withdraw-details">
                        <i class="fas fa-percent"></i> Comisión (14%): ${(feeAmount || 0).toLocaleString()} kz
                    </div>
                    <div class="withdraw-details">
                        <i class="fas fa-money-bill-wave"></i> Monto neto: ${(netAmount || 0).toLocaleString()} kz
                    </div>
                    <div class="withdraw-receiver">
                        <i class="fas fa-university"></i> ${w.receiver || 'Transferencia bancaria'}
                    </div>
                    <div class="withdraw-order-number">
                        <i class="fas fa-hashtag"></i> N° operación: ${orderNumber}
                    </div>
                    <div class="withdraw-date">
                        <i class="fas fa-calendar"></i> ${new Date(w.date).toLocaleString('es-MZ')}
                    </div>
                </div>
            `;
        }
        $('#withdrawalsList').html(html);
    } catch (error) {
        console.error('Error loading withdrawals:', error);
        $('#withdrawalsList').html(`
            <div class="empty-state">
                <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="empty-text">Error al cargar los datos<br><small>${error.message}</small></div>
            </div>
        `);
    }
}

loadWithdrawals();
setInterval(loadWithdrawals, 30000);
</script>
