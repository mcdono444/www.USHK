<script>
    function showMessage(msg, type) {
        var div = $('<div class="toast ' + type + '">' + msg + '</div>');
        $('body').append(div);
        setTimeout(function() { div.fadeOut(300, function() { $(this).remove(); }); }, 2500);
    }
    
    // Esperar Firebase estar pronto
    function getFirebase() {
        return new Promise((resolve) => {
            const checkInterval = setInterval(() => {
                if (window.firebaseModules) {
                    clearInterval(checkInterval);
                    resolve(window.firebaseModules);
                }
            }, 100);
        });
    }
    
    // Cargar empleados desde Firestore
    async function loadStaff() {
        try {
            const { db, collection, query, getDocs, orderBy } = await getFirebase();
            
            // Consultar empleados ordenados por ranking
            const staffRef = collection(db, 'staff');
            const q = query(staffRef, orderBy('ranking', 'asc'));
            const querySnapshot = await getDocs(q);
            
            let staffList = [];
            querySnapshot.forEach((doc) => {
                staffList.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            
            renderStaff(staffList);
        } catch(e) {
            console.error('Error loading staff:', e);
            showMessage('Error al cargar empleados', 'error');
            renderStaff([]);
        }
    }
    
    // Renderizar empleados en la página
    function renderStaff(staffList) {
        const container = $('#staffList');
        
        if (staffList.length === 0) {
            // Usar datos de ejemplo si no hay datos en Firestore
            staffList = getDefaultStaff();
        }
        
        let html = '';
        for (let staff of staffList) {
            const badgeIcon = getIconForBadge(staff.badgeType || 'trophy');
            html += `
                <div class="staff-card">
                    <div class="staff-avatar"><i class="fas ${staff.avatarIcon || 'fa-user'}"></i></div>
                    <div class="staff-info">
                        <div class="staff-name">${staff.name}</div>
                        <div class="staff-position">${staff.position}</div>
                        <div class="staff-bio">${staff.bio}</div>
                        <div class="staff-badge"><i class="fas ${badgeIcon}"></i> ${staff.badge}</div>
                    </div>
                </div>
            `;
        }
        
        container.html(html);
    }
    
    // Obtener icono según el tipo de insignia
    function getIconForBadge(badgeType) {
        const icons = {
            'trophy': 'fa-trophy',
            'chart': 'fa-chart-line',
            'handshake': 'fa-handshake',
            'heart': 'fa-heart',
            'code': 'fa-code'
        };
        return icons[badgeType] || 'fa-trophy';
    }
    
    // Datos de empleados por defecto
    function getDefaultStaff() {
        return [
            {
                name: 'Ahmed Mansouri',
                position: 'Director General - Gerente VIP',
                bio: 'Destacado en liderazgo de equipo y cumplimiento de objetivos corporativos. Ganador del premio al Mejor Empleado 2026.',
                badge: 'Mejor Empleado 2026',
                badgeType: 'trophy',
                avatarIcon: 'fa-user-tie',
                ranking: 1
            },
            {
                name: 'Sara Naqibi',
                position: 'Supervisora de Marketing',
                bio: 'Contribuyó a aumentar las ventas en un 150% en un año. Ganadora del premio a la Innovación.',
                badge: 'Modelo de Excelencia',
                badgeType: 'chart',
                avatarIcon: 'fa-user-graduate',
                ranking: 2
            },
            {
                name: 'Mohamed Abdullah',
                position: 'Gerente de Desarrollo de Negocios',
                bio: 'Estableció alianzas estratégicas con grandes empresas y contribuyó a la expansión de la plataforma.',
                badge: 'Mejor Alianza',
                badgeType: 'handshake',
                avatarIcon: 'fa-user',
                ranking: 3
            },
            {
                name: 'Fátima Zahra',
                position: 'Directora de Servicio al Cliente',
                bio: 'Obtuvo la calificación más alta en satisfacción del cliente y lideró al equipo de soporte a cifras récord.',
                badge: 'Premio al Servicio al Cliente',
                badgeType: 'heart',
                avatarIcon: 'fa-user-tie',
                ranking: 4
            },
            {
                name: 'Omar Khalid',
                position: 'Desarrollador Técnico',
                bio: 'Desarrolló la plataforma USHK y mejoró el rendimiento del sistema en un 80%.',
                badge: 'Premio a la Innovación Técnica',
                badgeType: 'code',
                avatarIcon: 'fa-user',
                ranking: 5
            },
            {
                name: 'Carlos Mendoza',
                position: 'Gerente de Ventas Mozambique',
                bio: 'Líder en ventas para la región de Angola, expandió la base de usuarios en un 200% en 6 meses.',
                badge: 'Top Ventas Mozambique',
                badgeType: 'chart',
                avatarIcon: 'fa-user',
                ranking: 6
            }
        ];
    }
    
    // Inicializar datos de ejemplo en Firestore si es primera vez
    async function initializeDefaultStaff() {
        try {
            const { db, collection, query, getDocs, setDoc, doc } = await getFirebase();
            
            // Verificar si ya existen empleados
            const staffRef = collection(db, 'staff');
            const q = query(staffRef);
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                // Crear empleados de ejemplo
                const defaultStaff = getDefaultStaff();
                
                for (let staff of defaultStaff) {
                    const docRef = doc(collection(db, 'staff'));
                    await setDoc(docRef, staff);
                }
            }
        } catch(e) {
            console.error('Error initializing staff:', e);
        }
    }
    
    // Inicializar
    async function init() {
        await initializeDefaultStaff();
        await loadStaff();
        // Recargar cada 60 segundos
        setInterval(loadStaff, 60000);
    }
    
    init();
</script>
